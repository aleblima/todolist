spring.application.name=Tasks

# ==========================================
# Configuração do Banco de Dados (PostgreSQL)
# ==========================================
# Os valores abaixo utilizam a sintaxe ${VARIAVEL_DE_AMBIENTE:valor_padrao_local}.
# No Railway, basta criar as variáveis DATABASE_URL, DATABASE_USERNAME e DATABASE_PASSWORD.
# (Atenção: A DATABASE_URL do Spring deve começar com jdbc:postgresql://)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tasks}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:admin}

# ==========================================
# Configuração do Hibernate / JPA
# ==========================================
# Para o deploy no Railway com banco de dados vazio, crie a variável de ambiente:
# SPRING_JPA_HIBERNATE_DDL_AUTO=update
# Isso fará com que o Spring crie a tabela no banco automaticamente na primeira vez.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
