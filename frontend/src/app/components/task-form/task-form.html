<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        {{ isEditMode ? 'Editar Tarefa' : 'Nova Tarefa' }}
      </mat-card-title>
    </mat-card-header>

    <div class="loading-shade" *ngIf="isLoading()">
      <mat-spinner></mat-spinner>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading()">
      <mat-card-content class="form-content">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Título</mat-label>
          <input matInput formControlName="title" placeholder="Ex: Comprar pão" />
          <mat-error *ngIf="titleControl?.hasError('required')">
            O título é obrigatório.
          </mat-error>
          <mat-error *ngIf="titleControl?.hasError('maxlength')">
            O título deve ter no máximo 70 caracteres.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="description" rows="4" placeholder="Detalhes opcionais..."></textarea>
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions align="end" class="form-actions">
        <button mat-button type="button" routerLink="/tasks">Cancelar</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="taskForm.invalid">
          Salvar
        </button>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
